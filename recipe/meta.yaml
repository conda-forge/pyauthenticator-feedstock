{% set name = "pyauthenticator" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyauthenticator-{{ version }}.tar.gz
  sha256: 8b6fe1f90fbcfa1d2033e25139e5479ab083fbbf1c4337a8ca6dddfc0dfd3e97

build:
  entry_points:
    - pyauthenticator=pyauthenticator.__main__:command_line_parser
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - pyotp >=2.9.0
    - qrcode >=8.2
    - pyzbar >=0.1.9
    - pillow >=11.3.0

test:
  imports:
    - pyauthenticator
  commands:
    - pip check
    - pyauthenticator --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jan-janssen/pyauthenticator
  summary: Similar to the Google authenticator just written in python.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
